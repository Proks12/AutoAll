<!DOCTYPE html>
<html lang="cs">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoAll - Detail auta</title>
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="theme.css">

<body class="theme-shell">
  <div class="page-layer min-h-screen flex flex-col">
    <header class="px-4 pt-4 md:px-8 md:pt-6">
      <div class="glass-nav mx-auto flex max-w-6xl items-center justify-between rounded-[1.75rem] px-5 py-4 md:px-7">
        <div>
          <div class="display-font text-2xl font-bold text-slate-900">Detail vozu</div>
          <div class="text-sm text-slate-600">Vsechno dulezite na jednom miste.</div>
        </div>
        <nav class="flex items-center gap-3 text-sm text-slate-700">
          <button id="themeToggle" type="button" class="rounded-full border border-slate-200 px-4 py-2 transition hover:bg-slate-100">Dark mode</button>

      </div>
    </header>

    <main class="mx-auto w-full max-w-6xl flex-grow px-4 py-6 md:px-8 md:py-10" id="carDetail">
      <a href="index.html" class="mb-5 inline-flex items-center gap-2 rounded-full border border-slate-200 bg-white px-4 py-2 text-sm text-slate-700 transition hover:bg-slate-100">← Zpet na vyhledavani</a>
      <div id="detailContent" class="hero-panel fade-up rounded-[2rem] p-6 md:p-10"></div>
      <div id="ratingSection" class="mt-6"></div>
    </main>

    <footer class="px-4 pb-4 md:px-8 md:pb-6">
      <div class="glass-nav mx-auto max-w-6xl rounded-[1.5rem] px-5 py-4 text-center text-sm text-slate-400">
        AutoAll zobrazuje technicke informace a navazujici forum.
      </div>
    </footer>
  </div>
</body>
</html>
